<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f6f7fb;
        color: #1f2937;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px;
      }

      .top {
        display: grid;
        grid-template-columns: 1.25fr .75fr;
        gap: 20px;
        align-items: start;
      }

      .card {
        background: #fff;
        border-radius: 16px;
        padding: 20px;
        box-shadow: 0 8px 24px rgba(0,0,0,.06);
      }

      .card.task-overdue {
        border: 1px solid #fecaca;
        box-shadow: 0 8px 24px rgba(220, 38, 38, 0.12);
      }

      .card.task-due-today {
        border: 1px solid #fde68a;
        box-shadow: 0 8px 24px rgba(217, 119, 6, 0.12);
      }

      .title {
        font-size: 28px;
        font-weight: 700;
        margin: 0 0 8px;
      }

      .sub {
        color: #6b7280;
        margin-bottom: 8px;
      }

      .activity-line {
        margin: 0 0 14px;
        font-size: 13px;
        font-weight: 700;
        color: #374151;
      }

      .activity-line.fresh {
        color: #166534;
      }

      .activity-line.warm {
        color: #b45309;
      }

      .activity-line.stale {
        color: #b91c1c;
      }

      .task-alert {
        display: none;
        margin: 0 0 14px;
        padding: 10px 12px;
        border-radius: 10px;
        font-size: 13px;
        font-weight: 700;
      }

      .task-alert.overdue {
        display: block;
        background: #fee2e2;
        color: #b91c1c;
      }

      .task-alert.due-today {
        display: block;
        background: #fef3c7;
        color: #b45309;
      }

      .badge-overdue,
      .badge-due-today,
      .badge-fresh,
      .badge-warm,
      .badge-stale {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }

      .badge-overdue {
        background: #fee2e2;
        color: #b91c1c;
      }

      .badge-due-today {
        background: #fef3c7;
        color: #b45309;
      }

      .badge-fresh {
        background: #dcfce7;
        color: #166534;
      }

      .badge-warm {
        background: #fef3c7;
        color: #b45309;
      }

      .badge-stale {
        background: #fee2e2;
        color: #b91c1c;
      }

      label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin: 14px 0 6px;
      }

      select, textarea, button, input {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
      }

      select, textarea, input {
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px;
        background: #fff;
      }

      textarea {
        resize: vertical;
      }

      #notesHistory {
        min-height: 260px;
        background: #f9fafb;
        color: #374151;
      }

      #newNote {
        min-height: 140px;
      }

      #notesRaw {
        display: none;
      }

      button {
        border: 0;
        background: #111827;
        color: white;
        border-radius: 10px;
        padding: 12px;
        margin-top: 14px;
        cursor: pointer;
      }

      .msg {
        margin-top: 12px;
        font-size: 14px;
        color: #065f46;
      }

      .back {
        display: inline-block;
        margin-bottom: 16px;
        text-decoration: none;
        color: #374151;
      }

      @media (max-width: 900px) {
        .top {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrap">
      <a class="back" href="<?= appUrl ?>?rep=<?= encodeURIComponent(rep || lead.assignedTo || '') ?>">
        &larr; Back to dashboard
      </a>

      <div class="top">
        <div class="card">
          <div class="title"><?= lead.businessName ?></div>

          <div class="sub">
            Lead ID: <?= lead.leadId ?> · <?= lead.city ?> · <?= lead.category ?>
          </div>

          <div class="sub">
            Rating: <?= lead.rating ?> · Reviews: <?= lead.reviews ?>
          </div>

          <div style="margin-top:18px;">
            <?!= mirrorHtml ?>
          </div>
        </div>

        <div class="card" id="crmCard">
          <div id="activityLine" class="activity-line">Last activity: <?= lead.lastUpdatedAt || '—' ?></div>
          <div id="taskAlert" class="task-alert"></div>

          <label for="status">Lead Status</label>
          <select id="status">
            <option value="New Lead" <?= lead.status === 'New Lead' ? 'selected' : '' ?>>New Lead</option>
            <option value="Contacted" <?= lead.status === 'Contacted' ? 'selected' : '' ?>>Contacted</option>
            <option value="Replied" <?= lead.status === 'Replied' ? 'selected' : '' ?>>Replied</option>
            <option value="Conversation" <?= lead.status === 'Conversation' ? 'selected' : '' ?>>Conversation</option>
            <option value="Call Booked" <?= lead.status === 'Call Booked' ? 'selected' : '' ?>>Call Booked</option>
            <option value="Closed Won" <?= lead.status === 'Closed Won' ? 'selected' : '' ?>>Closed Won</option>
            <option value="Closed Lost" <?= lead.status === 'Closed Lost' ? 'selected' : '' ?>>Closed Lost</option>
          </select>

          <label for="businessName">Business Name</label>
          <input id="businessName" type="text" value="<?= lead.businessName || '' ?>">

          <label for="address">Address</label>
          <input id="address" type="text" value="<?= lead.address || '' ?>">

          <label for="website">Website</label>
          <input id="website" type="text" value="<?= lead.website || '' ?>">

          <label for="mainPhone">Main Phone</label>
          <input id="mainPhone" type="text" value="<?= lead.mainPhone || '' ?>">

          <label for="mobilePhone">Mobile Phone</label>
          <input id="mobilePhone" type="text" value="<?= lead.mobilePhone || '' ?>">

          <label for="mainEmail">Main Email</label>
          <input id="mainEmail" type="text" value="<?= lead.mainEmail || '' ?>">

          <label for="contactName">Contact Name</label>
          <input id="contactName" type="text" value="<?= lead.contactName || '' ?>">

          <label for="contactRole">Contact Role</label>
          <input id="contactRole" type="text" value="<?= lead.contactRole || '' ?>">

          <label for="secondaryContactName">Secondary Contact Name</label>
          <input id="secondaryContactName" type="text" value="<?= lead.secondaryContactName || '' ?>">

          <label for="secondaryContactRole">Secondary Contact Role</label>
          <input id="secondaryContactRole" type="text" value="<?= lead.secondaryContactRole || '' ?>">

          <label for="secondaryContactPhone">Secondary Contact Phone</label>
          <input id="secondaryContactPhone" type="text" value="<?= lead.secondaryContactPhone || '' ?>">

          <label for="secondaryContactEmail">Secondary Contact Email</label>
          <input id="secondaryContactEmail" type="text" value="<?= lead.secondaryContactEmail || '' ?>">

          <label for="secondaryAddress">Secondary Address</label>
          <input id="secondaryAddress" type="text" value="<?= lead.secondaryAddress || '' ?>">

          <label for="activeTask">Active Task</label>
          <input id="activeTask" type="text" value="<?= lead.activeTask || '' ?>" placeholder="Add one active task">

          <label for="taskType">Task Type</label>
          <select id="taskType">
            <option value="" <?= !lead.taskType ? 'selected' : '' ?>>—</option>
            <option value="Call" <?= lead.taskType === 'Call' ? 'selected' : '' ?>>Call</option>
            <option value="Email" <?= lead.taskType === 'Email' ? 'selected' : '' ?>>Email</option>
            <option value="SMS" <?= lead.taskType === 'SMS' ? 'selected' : '' ?>>SMS</option>
            <option value="Follow-up" <?= lead.taskType === 'Follow-up' ? 'selected' : '' ?>>Follow-up</option>
            <option value="Proposal" <?= lead.taskType === 'Proposal' ? 'selected' : '' ?>>Proposal</option>
            <option value="Meeting" <?= lead.taskType === 'Meeting' ? 'selected' : '' ?>>Meeting</option>
            <option value="Other" <?= lead.taskType === 'Other' ? 'selected' : '' ?>>Other</option>
          </select>

          <label for="taskDueAt">Task Due At</label>
          <div id="taskInlineBadge" style="margin-bottom:8px;"></div>
          <input id="taskDueAt" type="datetime-local" value="<?= lead.taskDueAt || '' ?>">

          <label for="taskStatus">Task Status</label>
          <select id="taskStatus">
            <option value="" <?= !lead.taskStatus ? 'selected' : '' ?>>—</option>
            <option value="Open" <?= lead.taskStatus === 'Open' ? 'selected' : '' ?>>Open</option>
            <option value="Done" <?= lead.taskStatus === 'Done' ? 'selected' : '' ?>>Done</option>
          </select>

          <label for="notesHistory">Notes History</label>
          <textarea id="notesHistory" readonly></textarea>

          <label for="newNote">Add New Note</label>
          <textarea id="newNote" placeholder="Add a new note here..."></textarea>

          <textarea id="notesRaw" readonly><?= lead.notes || '' ?></textarea>

          <button onclick="saveLead()">Save Update</button>
          <div id="msg" class="msg"></div>
        </div>
      </div>
    </div>

    <script>
      function splitNoteEntries(rawNotes) {
        if (!rawNotes) return [];

        var normalized = String(rawNotes).replace(/\r\n/g, '\n').trim();
        if (!normalized) return [];

        var lines = normalized.split('\n');
        var entries = [];
        var current = [];

        function isEntryStart(line) {
          return /^\[\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}\]\s/.test(line);
        }

        for (var i = 0; i < lines.length; i++) {
          var line = lines[i];

          if (isEntryStart(line)) {
            if (current.length) {
              entries.push(current.join('\n').trim());
            }
            current = [line];
          } else {
            if (!current.length) {
              current = [line];
            } else {
              current.push(line);
            }
          }
        }

        if (current.length) {
          entries.push(current.join('\n').trim());
        }

        return entries.filter(function(entry) {
          return entry && entry.trim() !== '';
        });
      }

      function formatNotesDescending(rawNotes) {
        var entries = splitNoteEntries(rawNotes);
        return entries.reverse().join('\n\n');
      }

      function renderNotesHistory(rawNotes) {
        document.getElementById('notesHistory').value = formatNotesDescending(rawNotes || '');
      }

      function parseLocalDateTime(value) {
        if (!value) return null;

        var raw = String(value).trim();
        if (!raw) return null;

        var normalized = raw.replace(' ', 'T');
        var date = new Date(normalized);

        if (!isNaN(date.getTime())) {
          return date;
        }

        return null;
      }

      function parseAnyDate(value) {
        if (!value) return null;

        var raw = String(value).trim();
        if (!raw || raw === '—') return null;

        var firstTry = new Date(raw);
        if (!isNaN(firstTry.getTime())) return firstTry;

        var secondTry = new Date(raw.replace(' ', 'T'));
        if (!isNaN(secondTry.getTime())) return secondTry;

        return null;
      }

      function renderFreshness() {
        var activityLine = document.getElementById('activityLine');
        if (!activityLine) return;

        activityLine.classList.remove('fresh', 'warm', 'stale');

        var oldBadge = activityLine.querySelector('.badge-fresh, .badge-warm, .badge-stale');
        if (oldBadge) oldBadge.remove();

        var rawText = activityLine.textContent || '';
        var lastValue = rawText.replace(/^Last activity:\s*/, '').trim();
        var lastDate = parseAnyDate(lastValue);

        if (!lastDate) return;

        var now = new Date();
        var msPerDay = 24 * 60 * 60 * 1000;
        var diffDays = Math.floor((now - lastDate) / msPerDay);

        var state = diffDays <= 2 ? 'fresh' : diffDays <= 7 ? 'warm' : 'stale';
        activityLine.classList.add(state);

        var badge = document.createElement('span');
        badge.className =
          state === 'fresh' ? 'badge-fresh' :
          state === 'warm' ? 'badge-warm' :
          'badge-stale';
        badge.textContent = state === 'fresh' ? 'FRESH' : state === 'warm' ? 'WARM' : 'STALE';
        activityLine.appendChild(badge);
      }

      function renderTaskState() {
        var card = document.getElementById('crmCard');
        var alertBox = document.getElementById('taskAlert');
        var inlineBadge = document.getElementById('taskInlineBadge');
        var dueValue = document.getElementById('taskDueAt').value;
        var taskStatus = document.getElementById('taskStatus').value;

        card.classList.remove('task-overdue', 'task-due-today');
        alertBox.className = 'task-alert';
        alertBox.textContent = '';
        if (inlineBadge) inlineBadge.innerHTML = '';

        if (!dueValue || taskStatus === 'Done') {
          return;
        }

        var due = parseLocalDateTime(dueValue);
        if (!due) {
          return;
        }

        var now = new Date();
        var startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        var startOfTomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);

        if (due < now) {
          card.classList.add('task-overdue');
          alertBox.classList.add('overdue');
          alertBox.innerHTML = 'Task status: <span class="badge-overdue">OVERDUE</span>';
          if (inlineBadge) inlineBadge.innerHTML = '<span class="badge-overdue">OVERDUE</span>';
        } else if (due >= startOfToday && due < startOfTomorrow) {
          card.classList.add('task-due-today');
          alertBox.classList.add('due-today');
          alertBox.innerHTML = 'Task status: <span class="badge-due-today">TODAY</span>';
          if (inlineBadge) inlineBadge.innerHTML = '<span class="badge-due-today">TODAY</span>';
        }
      }

      function saveLead() {
        const status = document.getElementById('status').value;
        const businessName = document.getElementById('businessName').value;
        const address = document.getElementById('address').value;
        const website = document.getElementById('website').value;
        const mainPhone = document.getElementById('mainPhone').value;
        const mobilePhone = document.getElementById('mobilePhone').value;
        const mainEmail = document.getElementById('mainEmail').value;
        const contactName = document.getElementById('contactName').value;
        const contactRole = document.getElementById('contactRole').value;
        const secondaryContactName = document.getElementById('secondaryContactName').value;
        const secondaryContactRole = document.getElementById('secondaryContactRole').value;
        const secondaryContactPhone = document.getElementById('secondaryContactPhone').value;
        const secondaryContactEmail = document.getElementById('secondaryContactEmail').value;
        const secondaryAddress = document.getElementById('secondaryAddress').value;
        const activeTask = document.getElementById('activeTask').value;
        const taskType = document.getElementById('taskType').value;
        const taskDueAt = document.getElementById('taskDueAt').value;
        const taskStatus = document.getElementById('taskStatus').value;
        const newNote = document.getElementById('newNote').value;
        const msg = document.getElementById('msg');

        msg.textContent = 'Saving...';

        google.script.run
          .withSuccessHandler(function(result) {
            msg.textContent = 'Saved successfully.';

            if (result && typeof result.notes !== 'undefined') {
              document.getElementById('notesRaw').value = result.notes || '';
              renderNotesHistory(result.notes || '');
            }

            if (result) {
              document.getElementById('businessName').value = result.businessName || '';
              document.getElementById('address').value = result.address || '';
              document.getElementById('website').value = result.website || '';
              document.getElementById('mainPhone').value = result.mainPhone || '';
              document.getElementById('mobilePhone').value = result.mobilePhone || '';
              document.getElementById('mainEmail').value = result.mainEmail || '';
              document.getElementById('contactName').value = result.contactName || '';
              document.getElementById('contactRole').value = result.contactRole || '';
              document.getElementById('secondaryContactName').value = result.secondaryContactName || '';
              document.getElementById('secondaryContactRole').value = result.secondaryContactRole || '';
              document.getElementById('secondaryContactPhone').value = result.secondaryContactPhone || '';
              document.getElementById('secondaryContactEmail').value = result.secondaryContactEmail || '';
              document.getElementById('secondaryAddress').value = result.secondaryAddress || '';
              document.getElementById('activeTask').value = result.activeTask || '';
              document.getElementById('taskType').value = result.taskType || '';
              document.getElementById('taskDueAt').value = result.taskDueAt || '';
              document.getElementById('taskStatus').value = result.taskStatus || '';
            }

            document.getElementById('newNote').value = '';
            renderTaskState();
            renderFreshness();
            document.getElementById('newNote').focus();
          })
          .withFailureHandler(function(err) {
            msg.textContent = 'Error: ' + (err && err.message ? err.message : err);
          })
          .saveRepLeadUpdate(
            "<?= lead.leadId ?>",
            status,
            newNote,
            "<?= rep ?>",
            activeTask,
            taskType,
            taskDueAt,
            taskStatus,
            businessName,
            address,
            website,
            mainPhone,
            mobilePhone,
            mainEmail,
            contactName,
            contactRole,
            secondaryContactName,
            secondaryContactRole,
            secondaryContactPhone,
            secondaryContactEmail,
            secondaryAddress
          );
      }

      (function initNotes() {
        var rawNotes = document.getElementById('notesRaw').value || '';
        renderNotesHistory(rawNotes);
      })();

      (function initTaskState() {
        renderTaskState();
        document.getElementById('taskDueAt').addEventListener('change', renderTaskState);
        document.getElementById('taskStatus').addEventListener('change', renderTaskState);
      })();

      (function initFreshness() {
        renderFreshness();
      })();
    </script>
  </body>
</html>
