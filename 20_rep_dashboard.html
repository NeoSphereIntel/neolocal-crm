<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Barlow', Arial, sans-serif;
        margin: 0;
        background: #f5f7fb;
        color: #1f2937;
      }

      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }

      .title {
        margin: 0;
        font-size: 28px;
      }

      .sub {
        color: #6b7280;
        font-size: 14px;
      }

      .top-actions a {
        display: inline-block;
        text-decoration: none;
        background: #111827;
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
      }

      .filters {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 20px;
      }

      .filters input,
      .filters select {
        padding: 10px 12px;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        font-size: 14px;
        background: #fff;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 16px;
      }

      .card {
        background: #fff;
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 4px 18px rgba(0,0,0,0.06);
        border: 1px solid #e5e7eb;
      }

      .card h3 {
        margin: 0 0 8px;
        font-size: 20px;
      }

      .meta,
      .contact,
      .update,
      .taskline {
        font-size: 14px;
        color: #4b5563;
        margin-bottom: 8px;
      }

      .statusline {
        font-size: 14px;
        margin-bottom: 10px;
      }

      .pill {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        background: #eef2ff;
        font-size: 12px;
        margin-left: 6px;
      }

      .intel-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 10px;
      }

      .pill-intel {
        display: inline-block;
        padding: 4px 10px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: 700;
        background: #eef2ff;
        color: #3730a3;
      }

      .pill-opportunity {
        background: #dcfce7;
        color: #166534;
      }

      .task-open {
        color: #92400e;
        font-weight: 700;
      }

      .task-done {
        color: #065f46;
        font-weight: 700;
      }

      .task-overdue {
        border-color: #fecaca;
        box-shadow: 0 4px 18px rgba(220, 38, 38, 0.12);
      }

      .task-due-today {
        border-color: #fde68a;
        box-shadow: 0 4px 18px rgba(217, 119, 6, 0.12);
      }

      .taskline.overdue {
        color: #b91c1c;
        font-weight: 700;
      }

      .taskline.due-today {
        color: #b45309;
        font-weight: 700;
      }

      .badge-overdue,
      .badge-due-today,
      .badge-fresh,
      .badge-warm,
      .badge-stale {
        display: inline-block;
        margin-left: 8px;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 700;
      }

      .badge-overdue {
        background: #fee2e2;
        color: #b91c1c;
      }

      .badge-due-today {
        background: #fef3c7;
        color: #b45309;
      }

      .badge-fresh {
        background: #dcfce7;
        color: #166534;
      }

      .badge-warm {
        background: #fef3c7;
        color: #b45309;
      }

      .badge-stale {
        background: #fee2e2;
        color: #b91c1c;
      }

      .update.stale {
        color: #b91c1c;
        font-weight: 700;
      }

      .update.warm {
        color: #b45309;
        font-weight: 700;
      }

      .update.fresh {
        color: #166534;
        font-weight: 700;
      }

      .actions a {
        display: inline-block;
        margin-top: 10px;
        text-decoration: none;
        background: #111827;
        color: #fff;
        padding: 10px 14px;
        border-radius: 10px;
        font-size: 14px;
      }

      .empty {
        background: #fff;
        border: 1px dashed #cbd5e1;
        border-radius: 16px;
        padding: 24px;
        text-align: center;
        color: #6b7280;
      }

      /* ── Diagnosis Distribution Strip ───────────────────────────────── */

      .nl-diag-strip {
        background: #000e38;
        border-radius: 8px;
        padding: 14px 20px;
        margin-bottom: 20px;
        display: -webkit-flex;
        display: flex;
        -webkit-align-items: center;
        align-items: center;
        gap: 6px;
        -webkit-flex-wrap: wrap;
        flex-wrap: wrap;
      }

      .nl-diag-strip-label {
        font-family: 'Barlow Condensed', Arial, sans-serif !important;
        font-weight: 700;
        font-size: 10px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: rgba(255,255,255,0.45);
        margin-right: 8px;
      }

      .nl-diag-count {
        font-family: 'Barlow Condensed', Arial, sans-serif !important;
        font-weight: 700;
        font-size: 12px;
        letter-spacing: 1.5px;
        text-transform: uppercase;
        padding: 4px 12px;
        border-radius: 3px;
        white-space: nowrap;
      }

      .nl-count-anchor    { background: #1a6640; color: #fff; }
      .nl-count-contender { background: #00195c; color: #fff; border: 1px solid rgba(255,255,255,0.2); }
      .nl-count-underdog  { background: #ed8220; color: #fff; }
      .nl-count-outgunned { background: #bd0e20; color: #fff; }
      .nl-count-ghost     { background: #5a6378; color: #fff; }

      /* ── Card diagnosis badge ────────────────────────────────────────── */

      .nl-card-badge {
        font-family: 'Barlow Condensed', Arial, sans-serif !important;
        font-weight: 700;
        font-size: 11px;
        letter-spacing: 2px;
        text-transform: uppercase;
        padding: 3px 10px;
        border-radius: 3px;
        display: inline-block;
        margin-left: 8px;
        vertical-align: middle;
      }

      .nl-badge-anchor    { background: #1a6640; color: #fff; }
      .nl-badge-contender { background: #00195c; color: #fff; }
      .nl-badge-underdog  { background: #ed8220; color: #fff; }
      .nl-badge-outgunned { background: #bd0e20; color: #fff; }
      .nl-badge-ghost     { background: #5a6378; color: #fff; }

      .nl-mcs {
        font-family: 'Bebas Neue', Arial, sans-serif !important;
        font-size: 28px;
        color: #000e38;
        line-height: 1;
        display: inline-block;
        vertical-align: middle;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div>
          <h1 class="title">Rep Dashboard</h1>
          <div class="sub">Assigned to: <strong><?= rep ?></strong></div>
        </div>
        <div class="top-actions">
          <a href="<?= appUrl ?>?mode=add&rep=<?= encodeURIComponent(rep) ?>">+ Add Lead</a>
        </div>
      </div>

      <div class="filters">
        <input type="text" id="searchInput" placeholder="Search business, city, category, contact">
        <select id="statusFilter">
          <option value="">All lead statuses</option>
          <option value="New Lead">New Lead</option>
          <option value="Contacted">Contacted</option>
          <option value="Replied">Replied</option>
          <option value="Conversation">Conversation</option>
          <option value="Call Booked">Call Booked</option>
          <option value="Closed Won">Closed Won</option>
          <option value="Closed Lost">Closed Lost</option>
        </select>
        <select id="taskFilter">
          <option value="">All task statuses</option>
          <option value="Open">Open</option>
          <option value="Done">Done</option>
        </select>
      </div>

      <? if (!leads || !leads.length) { ?>
        <div class="empty">No leads assigned.</div>
      <? } else {
           var diagOrder = ['Anchor','Contender','Underdog','Outgunned','Ghost'];
           var diagCounts = {};
           for (var di = 0; di < diagOrder.length; di++) { diagCounts[diagOrder[di]] = 0; }
           for (var ci = 0; ci < leads.length; ci++) {
             var ds = String(leads[ci].diagnosisState || '');
             if (diagCounts.hasOwnProperty(ds)) diagCounts[ds]++;
           }
      ?>
        <div class="nl-diag-strip" id="diagStrip">
          <span class="nl-diag-strip-label">Pipeline</span>
          <? for (var di = 0; di < diagOrder.length; di++) {
               var dKey = diagOrder[di];
               var dCount = diagCounts[dKey];
               if (!dCount) continue;
               var dClass = 'nl-count-' + dKey.toLowerCase();
          ?>
            <span class="nl-diag-count <?= dClass ?>"><?= dKey ?> · <?= dCount ?></span>
          <? } ?>
        </div>

        <div class="grid" id="leadGrid">
          <? for (var i = 0; i < leads.length; i++) { var lead = leads[i];
               var cardDiagKey = String(lead.diagnosisState || '').toLowerCase();
               var cardBadgeClass = cardDiagKey ? 'nl-badge-' + cardDiagKey : '';
               var cardMcs = Math.round(lead.marketCaptureScore || 0);
          ?>
            <div class="card"
                 data-status="<?= lead.status || '' ?>"
                 data-task-status="<?= lead.taskStatus || '' ?>"
                 data-task-due-at="<?= lead.taskDueAt || '' ?>"
                 data-last-updated-at="<?= lead.lastUpdatedAt || '' ?>"
                 data-search="<?= [
                   lead.businessName || '',
                   lead.city || '',
                   lead.category || '',
                   lead.contactName || '',
                   lead.phone || '',
                   lead.email || '',
                   lead.activeTask || '',
                   lead.taskType || '',
                   lead.diagnosisState || ''
                 ].join(' ').toLowerCase() ?>">
              <h3>
                <?= lead.businessName || 'Unnamed Lead' ?>
                <? if (lead.diagnosisState && cardBadgeClass) { ?>
                  <span class="nl-card-badge <?= cardBadgeClass ?>"><?= lead.diagnosisState ?></span>
                <? } ?>
              </h3>
              <div class="meta"><?= lead.city || '—' ?> · <?= lead.category || '—' ?></div>
              <div class="statusline">
                Lead status: <span class="pill"><?= lead.status || '—' ?></span>
                <? if (cardMcs) { ?>
                  &nbsp;<span class="nl-mcs"><?= cardMcs ?></span>
                <? } ?>
              </div>
              <div class="meta">Rating: <?= lead.rating || 0 ?> · Reviews: <?= lead.reviews || 0 ?></div>

              <div class="contact">Contact: <?= lead.contactName || '—' ?></div>
              <div class="contact">Phone: <?= lead.phone || '—' ?></div>
              <div class="contact">Email: <?= lead.email || '—' ?></div>
              <div class="taskline">Task: <?= lead.activeTask || '—' ?></div>
              <div class="taskline">Type: <?= lead.taskType || '—' ?></div>
              <div class="taskline task-due-line">Due: <?= lead.taskDueAt || '—' ?></div>
              <div class="taskline">
                Task status:
                <span class="<?= (lead.taskStatus || '') === 'Done' ? 'task-done' : 'task-open' ?>">
                  <?= lead.taskStatus || '—' ?>
                </span>
              </div>
              <div class="update last-update-line">Last activity: <?= lead.lastUpdatedAt || '—' ?></div>
              <div class="actions">
                <a href="<?= appUrl ?>?leadId=<?= encodeURIComponent(lead.leadId) ?>&rep=<?= encodeURIComponent(rep) ?>">Open Lead</a>
              </div>
            </div>
          <? } ?>
        </div>
      <? } ?>
    </div>

    <script>
      (function () {
        var searchInput = document.getElementById('searchInput');
        var statusFilter = document.getElementById('statusFilter');
        var taskFilter = document.getElementById('taskFilter');
        var cards = Array.prototype.slice.call(document.querySelectorAll('.card'));

        function parseLocalDateTime(value) {
          if (!value) return null;

          var raw = String(value).trim();
          if (!raw) return null;

          var normalized = raw.replace(' ', 'T');
          var date = new Date(normalized);

          if (!isNaN(date.getTime())) {
            return date;
          }

          return null;
        }

        function parseAnyDate(value) {
          if (!value) return null;

          var raw = String(value).trim();
          if (!raw || raw === '—') return null;

          var firstTry = new Date(raw);
          if (!isNaN(firstTry.getTime())) return firstTry;

          var secondTry = new Date(raw.replace(' ', 'T'));
          if (!isNaN(secondTry.getTime())) return secondTry;

          return null;
        }

        function getTaskTimingState(taskDueAt, taskStatus) {
          if (!taskDueAt || taskStatus === 'Done') return '';

          var due = parseLocalDateTime(taskDueAt);
          if (!due) return '';

          var now = new Date();
          var startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
          var startOfTomorrow = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);

          if (due < now) {
            return 'overdue';
          }

          if (due >= startOfToday && due < startOfTomorrow) {
            return 'due-today';
          }

          return '';
        }

        function getFreshnessState(lastUpdatedAt) {
          var lastDate = parseAnyDate(lastUpdatedAt);
          if (!lastDate) return '';

          var now = new Date();
          var msPerDay = 24 * 60 * 60 * 1000;
          var diffDays = Math.floor((now - lastDate) / msPerDay);

          if (diffDays <= 2) return 'fresh';
          if (diffDays <= 7) return 'warm';
          return 'stale';
        }

        function decorateTaskState(card) {
          card.classList.remove('task-overdue', 'task-due-today');

          var dueLine = card.querySelector('.task-due-line');
          if (dueLine) {
            dueLine.classList.remove('overdue', 'due-today');
            var oldBadge = dueLine.querySelector('.badge-overdue, .badge-due-today');
            if (oldBadge) oldBadge.remove();
          }

          var taskDueAt = card.getAttribute('data-task-due-at') || '';
          var taskStatus = card.getAttribute('data-task-status') || '';
          var timingState = getTaskTimingState(taskDueAt, taskStatus);

          if (timingState === 'overdue') {
            card.classList.add('task-overdue');
            if (dueLine) {
              dueLine.classList.add('overdue');
              var overdueBadge = document.createElement('span');
              overdueBadge.className = 'badge-overdue';
              overdueBadge.textContent = 'OVERDUE';
              dueLine.appendChild(overdueBadge);
            }
          } else if (timingState === 'due-today') {
            card.classList.add('task-due-today');
            if (dueLine) {
              dueLine.classList.add('due-today');
              var dueTodayBadge = document.createElement('span');
              dueTodayBadge.className = 'badge-due-today';
              dueTodayBadge.textContent = 'TODAY';
              dueLine.appendChild(dueTodayBadge);
            }
          }
        }

        function decorateFreshness(card) {
          var updateLine = card.querySelector('.last-update-line');
          if (!updateLine) return;

          updateLine.classList.remove('fresh', 'warm', 'stale');

          var oldBadge = updateLine.querySelector('.badge-fresh, .badge-warm, .badge-stale');
          if (oldBadge) oldBadge.remove();

          var lastUpdatedAt = card.getAttribute('data-last-updated-at') || '';
          var freshness = getFreshnessState(lastUpdatedAt);

          if (!freshness) return;

          updateLine.classList.add(freshness);

          var badge = document.createElement('span');
          badge.className =
            freshness === 'fresh' ? 'badge-fresh' :
            freshness === 'warm' ? 'badge-warm' :
            'badge-stale';
          badge.textContent = freshness === 'fresh' ? 'FRESH' : freshness === 'warm' ? 'WARM' : 'STALE';
          updateLine.appendChild(badge);
        }

        function applyFilters() {
          var q = (searchInput.value || '').trim().toLowerCase();
          var status = statusFilter.value || '';
          var taskStatus = taskFilter.value || '';

          cards.forEach(function(card) {
            var hay = card.getAttribute('data-search') || '';
            var cardStatus = card.getAttribute('data-status') || '';
            var cardTaskStatus = card.getAttribute('data-task-status') || '';
            var matchesSearch = !q || hay.indexOf(q) !== -1;
            var matchesStatus = !status || cardStatus === status;
            var matchesTask = !taskStatus || cardTaskStatus === taskStatus;

            decorateTaskState(card);
            decorateFreshness(card);
            card.style.display = (matchesSearch && matchesStatus && matchesTask) ? '' : 'none';
          });
        }

        cards.forEach(function(card) {
          decorateTaskState(card);
          decorateFreshness(card);
        });

        if (searchInput) searchInput.addEventListener('input', applyFilters);
        if (statusFilter) statusFilter.addEventListener('change', applyFilters);
        if (taskFilter) taskFilter.addEventListener('change', applyFilters);

        applyFilters();
      })();
    </script>
  </body>
</html>
