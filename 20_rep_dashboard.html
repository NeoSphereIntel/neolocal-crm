<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f6f7fb; color: #1f2937; }
      .wrap { max-width: 1100px; margin: 0 auto; padding: 24px; }
      .topbar { margin-bottom: 20px; }
      .title { font-size: 28px; font-weight: 700; margin: 0 0 6px; }
      .sub { color: #6b7280; }
      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
      .card { background: #fff; border-radius: 16px; padding: 18px; box-shadow: 0 8px 24px rgba(0,0,0,.06); }
      .name { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
      .meta { color: #6b7280; font-size: 14px; line-height: 1.5; margin-bottom: 14px; }
      .btn { display: inline-block; text-decoration: none; background: #111827; color: #fff; padding: 10px 14px; border-radius: 10px; font-size: 14px; }
      .empty { background: #fff; padding: 18px; border-radius: 16px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div class="title">Rep Dashboard</div>
        <div class="sub">Assigned to: <?= rep ?></div>
      </div>

      <? if (!leads || !leads.length) { ?>
        <div class="empty">No leads assigned.</div>
      <? } else { ?>
        <div class="grid">
          <? leads.forEach(function(lead) { ?>
            <div class="card"><div style="color:red;font-weight:bold;">REP DASHBOARD V2</div>
              <div class="name"><?= lead.businessName ?></div>
              <div class="meta">
                <?= lead.city ?> · <?= lead.category ?><br>
                Status: <?= lead.status || 'New Lead' ?><br>
                Rating: <?= lead.rating ?> · Reviews: <?= lead.reviews ?>
              </div>
              <a class="btn" href="?leadId=<?= encodeURIComponent(lead.leadId) ?>">Open Lead</a>
            </div>
          <? }); ?>
        </div>
      <? } ?>
    </div>
  </body>
</html>
