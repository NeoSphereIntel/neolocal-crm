<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NeoLocal — Dashboard</title>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

  <header class="nl-header">
    <div class="nl-header-inner">
      <span class="nl-wordmark">NeoLocal</span>
      <span class="nl-header-rep" id="repName"></span>
    </div>
  </header>

  <div class="nl-container nl-main">

    <div id="loading" class="nl-loading">
      <div class="nl-spinner"></div>
      <span>Loading leads…</span>
    </div>

    <div id="errorMsg" class="nl-alert nl-alert-error nl-mb-24" style="display:none;"></div>

    <div id="content" style="display:none;">

      <!-- Stats bar -->
      <div id="statsBar" class="nl-stats-bar"></div>

      <!-- Action queue -->
      <section class="nl-section">
        <h2 class="nl-section-title">Action Queue</h2>
        <div id="actionQueue" class="nl-action-queue"></div>
      </section>

      <!-- Full list -->
      <section class="nl-section">
        <div class="nl-list-controls">
          <input type="text" id="searchInput" class="nl-search-input" placeholder="Search by name, city, or category…">
          <a href="add.html" id="addLeadLink" class="nl-btn nl-btn-primary nl-btn-sm">+ Add Lead</a>
        </div>
        <div id="tableWrap"></div>
      </section>

    </div>
  </div>

  <!-- Bulk action bar — fixed bottom, shown when rows are selected -->
  <div id="bulkBar" class="nl-bulk-bar" style="display:none;">
    <span id="bulkCount" class="nl-bulk-count"></span>
    <select id="bulkStatusSelect" class="nl-bulk-select">
      <option value="">— Set Stage —</option>
      <option value="Contacted">Contacted</option>
      <option value="Replied">Replied</option>
      <option value="Qualified">Qualified</option>
      <option value="Call Booked">Call Booked</option>
      <option value="Closed Won">Closed Won</option>
      <option value="Closed Lost">Closed Lost</option>
    </select>
    <input id="bulkRepInput" type="text" class="nl-bulk-select" placeholder="Assign rep…" style="width:140px;">
    <button id="bulkApplyBtn" class="nl-btn nl-btn-primary nl-btn-sm">Apply</button>
    <button id="bulkClearBtn" class="nl-btn nl-btn-sm" style="border:1px solid rgba(255,255,255,0.4);color:#fff;background:transparent;">Clear</button>
    <span id="bulkMsg" style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;letter-spacing:1px;"></span>
  </div>

  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
